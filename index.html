<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale= 0.6">
    <link data-rh="true" rel="icon" href="static/favicon.png">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #btc-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        #coin-label {
            font-size: 64px;
            font-weight: bold;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #btc-container #btc-price-display {
            display: block;
            font-size: 24px;
            margin-top: 10px;
        }
        #coin-label {
            cursor: pointer;
        }
        #coin-search {
            display: none;
            margin-top: 10px;
        }
        #coin-search.visible {
            display: block;
        }
        #coin-input {
            font-size: 18px;
            padding: 8px 12px;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #ccc;
            border-radius: 6px;
            outline: none;
            width: 120px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #coin-input:focus {
            border-color: #666;
        }
    </style>
</head>

<body>
    <div id="btc-container">
        <span id="coin-label">BTC</span>
        <span id="btc-price-display">Loading price...</span>
        <div id="coin-search">
            <input type="text" id="coin-input" placeholder="e.g. ETH" maxlength="10">
        </div>
    </div>
</body>
<script type="text/javascript" src="js/bitcoinprice.js"></script>

</html>
